name = "tessera"
compatibility_date = "2025-03-01"

pages_build_output_dir = "dist"

[vars]
APP_ENV = "development"
DYNAMIC_ENVIRONMENT_ID = "28958007-e672-4e24-bd56-abadc9d639e9"

[[d1_databases]]
binding = "DB"
database_name = "tessera-referral-db"
database_id = "88a7a5ff-2c9f-468b-bc48-053489f735a7"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "7f042d440ec44368bdf4a0dc8a38c0e6"

[[kv_namespaces]]
binding = "LEADERBOARD_CACHE"
id = "bea82344082d4078949725327c186f22"

[[r2_buckets]]
binding = "REFERRAL_IMAGES"
bucket_name = "tessera-referral-images"

# Browser Rendering API credentials (set these in production via wrangler secret)
# CLOUDFLARE_ACCOUNT_ID = "your-account-id"
# CLOUDFLARE_API_TOKEN = "your-api-token"

# twitterapi.io key used by /api/social/check-referral-tweet.
# Set via: wrangler secret put TWITTERAPI_IO_KEY
# For local dev, add TWITTERAPI_IO_KEY=... to .dev.vars (gitignored). Never commit the key.

# Solana mainnet RPC used by /api/eligibility/solana-mobile to check Saga /
# Chapter 2 / Seeker Genesis Token ownership. SOLANA_MAINNET_RPC_URL wins if
# set; otherwise a Helius URL is derived from HELIUS_API_KEY. If neither is
# configured, the endpoint responds with 'unavailable' and the check falls
# back to 'unmet' (so a mock row in mock_solana_mobile is required for QA).
# Set via: wrangler secret put HELIUS_API_KEY  (or SOLANA_MAINNET_RPC_URL)
